<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chat</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-light: rgba(59, 130, 246, 0.15);
            --success: #22c55e;
            --warning: #eab308;
            --error: #ef4444;
            --border: #334155;
            --border-light: #475569;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: white;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        .status-dot.error {
            background: var(--error);
        }

        .status-dot.loading {
            background: var(--warning);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Settings Panel */
        .settings-panel {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .settings-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .settings-label {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .settings-toggle {
            position: relative;
            width: 40px;
            height: 22px;
            background: var(--bg-tertiary);
            border-radius: 11px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            padding: 0;
        }

        .settings-toggle.active {
            background: var(--accent);
        }

        .settings-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            transition: var(--transition);
        }

        .settings-toggle.active::after {
            left: 20px;
        }

        .settings-select {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px 10px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        .settings-select:focus {
            border-color: var(--accent);
        }

        /* Main Layout */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--accent);
        }

        .message.assistant .message-avatar {
            background: var(--bg-tertiary);
        }

        .message-bubble {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 14px 18px;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid var(--border);
        }

        .message.user .message-bubble {
            background: var(--accent-light);
            border-color: var(--accent);
        }

        .message-bubble p {
            margin-bottom: 8px;
        }

        .message-bubble p:last-child {
            margin-bottom: 0;
        }

        .message-bubble code {
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .message-bubble pre {
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
        }

        /* Citations */
        .citations-toggle {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .citations-toggle summary {
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        .citations-toggle summary:hover {
            color: var(--accent);
        }

        .citation-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 6px 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .citation-item .doc-badge {
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            color: var(--accent);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .citation-item .quote-text {
            font-style: italic;
        }

        .citation-valid {
            color: var(--success);
        }

        .citation-invalid {
            color: var(--error);
        }

        /* Sources */
        .sources-toggle {
            margin-top: 8px;
        }

        .sources-toggle summary {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 12px;
        }

        .sources-toggle summary:hover {
            color: var(--text-secondary);
        }

        .source-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 12px;
            color: var(--text-muted);
        }

        .source-item .source-score {
            color: var(--accent);
        }

        /* Metadata */
        .message-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .message-meta .model-badge {
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .message-meta .time {
            color: var(--text-muted);
        }

        .badge-valid {
            color: var(--success);
        }

        .badge-invalid {
            color: var(--error);
        }

        .badge-injection {
            color: var(--warning);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-4px); }
        }

        /* Input Area */
        .input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 16px 24px;
            flex-shrink: 0;
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-wrapper textarea {
            width: 100%;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 48px;
            max-height: 150px;
            line-height: 1.5;
            transition: var(--transition);
        }

        .input-wrapper textarea:focus {
            border-color: var(--accent);
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-muted);
        }

        .btn-send {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .btn-send:hover {
            background: var(--accent-hover);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-send svg {
            width: 20px;
            height: 20px;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header .clear-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .sidebar-header .clear-btn:hover {
            border-color: var(--error);
            color: var(--error);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 20px;
        }

        .sidebar-content::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-content::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 2px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 4px;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: var(--bg-tertiary);
        }

        .history-item.active {
            background: var(--accent-light);
            border-color: var(--accent);
        }

        .history-item .question {
            font-size: 13px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item .meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            padding: 40px;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state h3 {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 13px;
            line-height: 1.5;
        }

        /* Error message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-top: 8px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .message {
                max-width: 95%;
            }

            .settings-panel {
                padding: 10px 16px;
                gap: 10px;
            }

            .header {
                padding: 12px 16px;
            }

            .messages {
                padding: 16px;
            }

            .input-area {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="header-logo">R</div>
            <div>
                <div class="header-title">RAG Chat</div>
                <div class="header-subtitle">Retrieval-Augmented Generation</div>
            </div>
        </div>
        <div class="header-status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Проверка соединения...</span>
        </div>
    </header>

    <!-- Settings -->
    <div class="settings-panel">
        <div class="settings-group">
            <span class="settings-label">Гибридный поиск</span>
            <button class="settings-toggle active" id="toggleHybrid" role="switch" aria-checked="true"></button>
        </div>
        <div class="settings-group">
            <span class="settings-label">Reranker</span>
            <button class="settings-toggle" id="toggleReranker" role="switch" aria-checked="false"></button>
        </div>
        <div class="settings-group">
            <span class="settings-label">Top-K</span>
            <select class="settings-select" id="selectTopK">
                <option value="3">3</option>
                <option value="5" selected>5</option>
                <option value="10">10</option>
                <option value="15">15</option>
                <option value="20">20</option>
            </select>
        </div>
        <div class="settings-group">
            <span class="settings-label">Температура</span>
            <select class="settings-select" id="selectTemperature">
                <option value="0.0">0.0</option>
                <option value="0.1">0.1</option>
                <option value="0.3" selected>0.3</option>
                <option value="0.5">0.5</option>
                <option value="0.7">0.7</option>
                <option value="1.0">1.0</option>
            </select>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Chat -->
        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="empty-state" id="emptyState">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                    </svg>
                    <h3>Задайте вопрос</h3>
                    <p>Напишите вопрос по вашему корпусу документов.<br>Сервис найдёт релевантные чанки и сгенерирует ответ.</p>
                </div>
            </div>

            <!-- Input -->
            <div class="input-area">
                <div class="input-container">
                    <div class="input-wrapper">
                        <textarea id="questionInput" placeholder="Задайте вопрос по документам..." rows="1" maxlength="2000"></textarea>
                    </div>
                    <button class="btn-send" id="sendBtn" title="Отправить">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19V5m0 0l-7 7m7-7l7 7" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <span>История</span>
                <button class="clear-btn" id="clearHistoryBtn">Очистить</button>
            </div>
            <div class="sidebar-content" id="historyList">
                <div class="empty-state" style="padding: 20px;">
                    <p style="font-size: 13px;">История пуста</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1/base';

        // State
        let history = JSON.parse(localStorage.getItem('rag_history') || '[]');
        let isStreaming = false;
        let currentStreamController = null;

        // DOM refs
        const messagesEl = document.getElementById('messages');
        const emptyState = document.getElementById('emptyState');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const toggleHybrid = document.getElementById('toggleHybrid');
        const toggleReranker = document.getElementById('toggleReranker');
        const selectTopK = document.getElementById('selectTopK');
        const selectTemperature = document.getElementById('selectTemperature');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        // Auto-resize textarea
        questionInput.addEventListener('input', () => {
            questionInput.style.height = 'auto';
            questionInput.style.height = Math.min(questionInput.scrollHeight, 150) + 'px';
        });

        // Enter to send (Shift+Enter for newline)
        questionInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        // Toggles
        toggleHybrid.addEventListener('click', () => {
            toggleHybrid.classList.toggle('active');
            toggleHybrid.setAttribute('aria-checked', toggleHybrid.classList.contains('active'));
        });

        toggleReranker.addEventListener('click', () => {
            toggleReranker.classList.toggle('active');
            toggleReranker.setAttribute('aria-checked', toggleReranker.classList.contains('active'));
        });

        // Clear history
        clearHistoryBtn.addEventListener('click', () => {
            history = [];
            localStorage.removeItem('rag_history');
            renderHistory();
        });

        // Check health on load
        checkHealth();

        // Render history
        renderHistory();

        // Scroll to bottom helper
        function scrollToBottom() {
            const el = messagesEl;
            el.scrollTop = el.scrollHeight;
        }

        // Check API health
        async function checkHealth() {
            try {
                const res = await fetch(`${API_BASE}/health`);
                const data = await res.json();
                if (data.status === 'ok') {
                    statusDot.className = 'status-dot';
                    statusText.textContent = 'Сервис работает';
                } else {
                    statusDot.className = 'status-dot error';
                    statusText.textContent = 'Ошибка сервиса';
                }
            } catch {
                statusDot.className = 'status-dot error';
                statusText.textContent = 'Нет соединения';
            }
        }

        // Send message
        async function sendMessage() {
            const question = questionInput.value.trim();
            if (!question || isStreaming) return;

            questionInput.value = '';
            questionInput.style.height = 'auto';

            // Hide empty state
            emptyState.style.display = 'none';

            // Add user message
            addMessage('user', question);

            // Add assistant placeholder
            const assistantMsgId = addMessage('assistant', '', true);

            // Save to history
            saveToHistory(question);

            const useHybrid = toggleHybrid.classList.contains('active');
            const useReranker = toggleReranker.classList.contains('active');
            const topK = parseInt(selectTopK.value);
            const temperature = parseFloat(selectTemperature.value);

            isStreaming = true;
            sendBtn.disabled = true;
            statusDot.className = 'status-dot loading';
            statusText.textContent = 'Генерация...';

            try {
                const res = await fetch(`${API_BASE}/ask/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question,
                        top_k: topK,
                        temperature,
                        use_hybrid_search: useHybrid,
                        use_reranker: useReranker,
                    }),
                });

                if (!res.ok) {
                    const errText = await res.text();
                    updateMessage(assistantMsgId, `**Ошибка:** ${errText}`);
                    isStreaming = false;
                    sendBtn.disabled = false;
                    statusDot.className = 'status-dot error';
                    statusText.textContent = 'Ошибка запроса';
                    return;
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    fullText += chunk;
                    updateMessage(assistantMsgId, fullText);
                    scrollToBottom();
                }

                // After streaming, fetch full response with metadata
                await fetchFullResponse(assistantMsgId, question, useHybrid, useReranker, topK, temperature);

            } catch (err) {
                updateMessage(assistantMsgId, `**Ошибка соединения:** ${err.message}`);
            } finally {
                isStreaming = false;
                sendBtn.disabled = false;
                statusDot.className = 'status-dot';
                statusText.textContent = 'Сервис работает';
            }
        }

        // Fetch full response with citations and sources
        async function fetchFullResponse(msgId, question, useHybrid, useReranker, topK, temperature) {
            try {
                const res = await fetch(`${API_BASE}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question,
                        top_k: topK,
                        temperature,
                        use_hybrid_search: useHybrid,
                        use_reranker: useReranker,
                    }),
                });

                if (!res.ok) return;

                const data = await res.json();
                appendMetadata(msgId, data);
            } catch {
                // Silent fail — streaming text already shown
            }
        }

        // Add message to chat
        function addMessage(role, text, isLoading = false) {
            const id = 'msg-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.id = id;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? 'U' : 'R';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            if (isLoading) {
                const indicator = document.createElement('div');
                indicator.className = 'typing-indicator';
                indicator.innerHTML = '<span></span><span></span><span></span>';
                bubble.appendChild(indicator);
            } else {
                const content = document.createElement('div');
                content.className = 'message-content';
                content.innerHTML = formatText(text);
                bubble.appendChild(content);
            }

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            messagesEl.appendChild(msgDiv);

            scrollToBottom();
            return id;
        }

        // Update message text (for streaming)
        function updateMessage(id, text) {
            const msgEl = document.getElementById(id);
            if (!msgEl) return;

            const bubble = msgEl.querySelector('.message-bubble');
            if (!bubble) return;

            // Remove typing indicator if present
            const indicator = bubble.querySelector('.typing-indicator');
            if (indicator) indicator.remove();

            let content = bubble.querySelector('.message-content');
            if (!content) {
                content = document.createElement('div');
                content.className = 'message-content';
                bubble.appendChild(content);
            }

            content.innerHTML = formatText(text);
        }

        // Append metadata (citations, sources, model info)
        function appendMetadata(msgId, data) {
            const msgEl = document.getElementById(msgId);
            if (!msgEl) return;

            const bubble = msgEl.querySelector('.message-bubble');
            if (!bubble) return;

            // Remove existing metadata if any
            const existingMeta = bubble.querySelector('.message-footer');
            if (existingMeta) existingMeta.remove();

            const footer = document.createElement('div');
            footer.className = 'message-footer';

            // Model + time
            const meta = document.createElement('div');
            meta.className = 'message-meta';

            if (data.model_used) {
                const modelBadge = document.createElement('span');
                modelBadge.className = 'model-badge';
                modelBadge.textContent = data.model_used;
                meta.appendChild(modelBadge);
            }

            if (data.processing_time_ms) {
                const time = document.createElement('span');
                time.className = 'time';
                time.textContent = `${(data.processing_time_ms / 1000).toFixed(1)}s`;
                meta.appendChild(time);
            }

            if (data.injection_detected) {
                const inj = document.createElement('span');
                inj.className = 'badge-injection';
                inj.textContent = '⚠ Injection detected';
                meta.appendChild(inj);
            }

            if (data.has_valid_citations !== undefined) {
                const cit = document.createElement('span');
                cit.className = data.has_valid_citations ? 'badge-valid' : 'badge-invalid';
                cit.textContent = data.has_valid_citations ? '✓ Цитаты валидны' : '✗ Есть невалидные цитаты';
                meta.appendChild(cit);
            }

            footer.appendChild(meta);

            // Citations
            if (data.citations && data.citations.length > 0) {
                const details = document.createElement('details');
                details.className = 'citations-toggle';
                const summary = document.createElement('summary');
                summary.textContent = `Цитаты (${data.citations.length})`;
                details.appendChild(summary);

                data.citations.forEach(c => {
                    const item = document.createElement('div');
                    item.className = 'citation-item';
                    const isInvalid = data.invalid_citations &&
                        data.invalid_citations.some(ic => ic.doc_id === c.doc_id && ic.quote === c.quote);
                    item.innerHTML = `
                        <span class="doc-badge">doc_${c.doc_id}</span>
                        <span class="quote-text ${isInvalid ? 'citation-invalid' : 'citation-valid'}">"${escapeHtml(c.quote)}"</span>
                    `;
                    details.appendChild(item);
                });

                footer.appendChild(details);
            }

            // Sources
            if (data.sources && data.sources.length > 0) {
                const details = document.createElement('details');
                details.className = 'sources-toggle';
                const summary = document.createElement('summary');
                summary.textContent = `Источники (${data.sources.length})`;
                details.appendChild(summary);

                data.sources.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'source-item';
                    const score = s.fused_score ? s.fused_score.toFixed(4) : (s.score ? s.score.toFixed(4) : 'N/A');
                    item.innerHTML = `
                        <span>doc_${s.doc_id} · ${(s.text || '').substring(0, 60)}...</span>
                        <span class="source-score">${score}</span>
                    `;
                    details.appendChild(item);
                });

                footer.appendChild(details);
            }

            bubble.appendChild(footer);
            scrollToBottom();
        }

        // Format text (markdown-like)
        function formatText(text) {
            if (!text) return '';

            let html = escapeHtml(text);

            // Code blocks
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Bold
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // Italic
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // Line breaks
            html = html.replace(/\n/g, '<br>');

            return html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Save to history
        function saveToHistory(question) {
            history.unshift({
                id: Date.now(),
                question: question,
                timestamp: new Date().toISOString(),
            });

            // Keep last 50
            if (history.length > 50) {
                history = history.slice(0, 50);
            }

            localStorage.setItem('rag_history', JSON.stringify(history));
            renderHistory();
        }

        // Render history sidebar
        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = `
                    <div class="empty-state" style="padding: 20px;">
                        <p style="font-size: 13px;">История пуста</p>
                    </div>
                `;
                return;
            }

            historyList.innerHTML = history.map(item => `
                <div class="history-item" data-question="${escapeHtml(item.question)}">
                    <div class="question">${escapeHtml(item.question)}</div>
                    <div class="meta">${new Date(item.timestamp).toLocaleString('ru-RU')}</div>
                </div>
            `).join('');

            // Click to fill question
            historyList.querySelectorAll('.history-item').forEach(el => {
                el.addEventListener('click', () => {
                    questionInput.value = el.dataset.question;
                    questionInput.style.height = 'auto';
                    questionInput.style.height = Math.min(questionInput.scrollHeight, 150) + 'px';
                    questionInput.focus();
                });
            });
        }
    </script>
</body>
</html>
