services:
  postgres:
    image: ankane/pgvector:latest
    container_name: end_to_end_db
    environment:
      POSTGRES_USER: ${PGVECTOR_USER:-rag}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-ragpass}
      POSTGRES_DB: ${PGVECTOR_DATABASE:-ragdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-rag} -d ${PGVECTOR_DATABASE:-ragdb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  ollama:
    image: ollama/ollama:latest
    container_name: end_to_end_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=4
    restart: unless-stopped
    networks:
      - app_network
    command: serve

  service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: end_to_end_service
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./eval:/app/eval
      - ./logs:/app/logs
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - app_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: end_to_end_frontend
    ports:
      - "8080:80"
    depends_on:
      - service
    networks:
      - app_network

volumes:
  pgdata:
  ollama_data:

networks:
  app_network:
    driver: bridge